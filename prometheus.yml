global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'auth-service'
    static_configs:
      - targets: ['cinereserve-auth-service:8080']
  - job_name: 'catalog-service'
    static_configs:
      - targets: ['cinereserve-catalog-service:8080']
  - job_name: 'booking-service'
    static_configs:
      - targets: ['cinereserve-booking-service:8080']
