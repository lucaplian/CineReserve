version: '3.2'

services:
 agent:
  image: portainer/agent:2.11.1
  volumes:
   - /var/run/docker.sock:/var/run/docker.sock
  networks:
   - cinereserve-gateway-network

  deploy:
   mode: global
   placement:
    constraints: [node.platform.os == linux]

 portainer:
  image: portainer/portainer-ce:2.11.1
  command: -H tcp://tasks.agent:9001 --tlsskipverify
  ports:
   - "9001:9000"
  volumes:
   - portainer_data:/data
  networks:
   - cinereserve-gateway-network
  deploy:
   mode: replicated
   replicas: 1
   placement:
    constraints: [node.role == manager]

networks:
 cinereserve-gateway-network:
  driver: overlay
  attachable: true

volumes:
 portainer_data: