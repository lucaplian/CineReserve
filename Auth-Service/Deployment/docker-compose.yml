version: "3.8"

services:
  cinereserve-auth-db:
    image: postgres:13.2-alpine
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: cinereserve-auth
      POSTGRES_DB: cinereserve-auth
      POSTGRES_PASSWORD: cinereserve-auth
    volumes:
      - cinereserve-app-db-vol:/var/lib/postgresql/data

volumes:
  cinereserve-auth-db-vol: